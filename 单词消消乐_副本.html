<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词消消乐 - Word Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5ab0a8;
            --primary-light: #8fd4cd;
            --secondary: #f4a261;
            --accent: #e8837c;
            --success: #7bc7a0;
            --warning: #f2cc8f;
            --danger: #e07a6b;
            --dark: #3d4f5f;
            --light: #f9fafb;
            --card-shadow: 0 8px 24px rgba(90,176,168,0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #e0f4f1 0%, #fef8f0 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(90,176,168,0.15), 0 4px 12px rgba(0,0,0,0.04);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .game-header {
            background: linear-gradient(135deg, #5ab0a8, #8fd4cd);
            padding: 20px 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
            font-size: 12px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        /* Screens */
        .screen {
            display: none;
            padding: 24px;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            padding: 40px 24px;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .start-screen h2 {
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .start-screen p {
            color: #636e72;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .level-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .level-btn {
            padding: 16px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .level-btn:hover {
            border-color: var(--primary);
            background: #f0faf8;
        }

        .level-btn.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #5ab0a8, #7ec8c1);
            color: white;
        }

        .level-btn .level-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .level-btn .level-name {
            font-size: 14px;
            font-weight: 600;
        }

        .level-btn .level-desc {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5ab0a8, #7ec8c1);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(90,176,168,0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90,176,168,0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Word Count Section */
        .word-count-section {
            margin-bottom: 24px;
            padding: 16px;
            background: #f8fcfb;
            border-radius: 14px;
            border: 1px solid #e0eeec;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 12px;
            text-align: left;
        }

        .word-count-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .count-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #d8eeeb;
            background: white;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .count-btn:hover {
            background: #eef8f7;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .count-btn:active {
            transform: scale(0.95);
        }

        .count-display {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .count-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .count-unit {
            font-size: 13px;
            color: #7a9e9a;
        }

        .time-estimate {
            font-size: 12px;
            color: #7a9e9a;
            text-align: center;
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e8f0ef;
            line-height: 1.5;
        }

        .time-estimate strong {
            color: var(--primary);
            font-size: 14px;
        }

        /* Learning Screen */
        .learning-screen {
            text-align: center;
        }

        .learning-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dfe6e9;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: var(--primary);
            transform: scale(1.2);
        }

        .progress-dot.done {
            background: var(--success);
        }

        .flashcard {
            background: linear-gradient(135deg, #f4fbfa, #ffffff);
            border: 2px solid #d8eeeb;
            border-radius: 20px;
            padding: 40px 24px;
            margin-bottom: 24px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .flashcard:hover {
            transform: scale(1.02);
            box-shadow: var(--card-shadow);
        }

        .flashcard .word {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .flashcard .phonetic {
            font-size: 16px;
            color: #636e72;
            margin-bottom: 16px;
        }

        .flashcard .meaning {
            font-size: 20px;
            color: var(--primary);
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .flashcard.flipped .meaning {
            opacity: 1;
        }

        .flashcard .flip-hint {
            position: absolute;
            bottom: 16px;
            font-size: 12px;
            color: #b2bec3;
        }

        .learning-btns {
            display: flex;
            gap: 12px;
        }

        .learning-btns button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-know {
            background: linear-gradient(135deg, #7bc7a0, #5ab09a);
            color: white;
        }

        .btn-dont-know {
            background: linear-gradient(135deg, #e8837c, #d4706a);
            color: white;
        }

        .btn-fuzzy {
            background: linear-gradient(135deg, #f2cc8f, #e0b46c);
            color: white;
        }

        .btn-next {
            background: var(--primary);
            color: white;
        }

        /* Game Screen */
        .game-screen {
            padding: 16px;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .timer {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
        }

        .timer.warning {
            color: var(--danger);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .combo-display {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            opacity: 0;
            transition: all 0.3s;
        }

        .combo-display.active {
            opacity: 1;
            animation: comboAnim 0.3s ease;
        }

        @keyframes comboAnim {
            0% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        .score-display {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            max-height: 360px;
            overflow-y: auto;
            padding: 4px;
        }

        .tile {
            min-height: 44px;
            max-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 4px;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            position: relative;
            word-break: break-word;
            overflow: hidden;
        }

        .tile.english {
            background: linear-gradient(135deg, #eef8f7, #dff0ee);
            border: 2px solid #b8ddd9;
            color: #3d8a83;
        }

        .tile.chinese {
            background: linear-gradient(135deg, #fef6ee, #fdeee0);
            border: 2px solid #f5d5b3;
            color: #c47a3a;
        }

        .tile:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(90,176,168,0.2);
        }

        .tile.selected {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(90,176,168,0.35);
            border-color: var(--primary);
            background: linear-gradient(135deg, #e6f5f3, #ccebe7);
            color: #3d8a83;
        }

        .tile.correct {
            animation: correctAnim 0.5s ease forwards;
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        @keyframes correctAnim {
            0% { transform: scale(1.1); }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .tile.wrong {
            animation: wrongAnim 0.4s ease;
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        @keyframes wrongAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .tile.hint {
            animation: hintPulse 0.8s ease infinite;
            border-color: #f2cc8f;
            box-shadow: 0 0 12px rgba(242,204,143,0.5);
        }

        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(242,204,143,0.3); }
            50% { box-shadow: 0 0 16px rgba(242,204,143,0.6); }
        }

        .tile.eliminated {
            visibility: hidden;
            pointer-events: none;
        }

        /* Power-ups */
        .powerups {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .powerup-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #e0eeec;
            background: #f8fcfb;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .powerup-btn:hover {
            border-color: var(--primary);
            background: #eef8f7;
            transform: scale(1.1);
        }

        .powerup-btn .count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #e8837c;
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
            padding: 40px 24px;
        }

        .result-icon {
            font-size: 72px;
            margin-bottom: 16px;
        }

        .result-screen h2 {
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .result-screen .subtitle {
            color: #636e72;
            margin-bottom: 32px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .result-stat {
            background: #f4fbfa;
            border-radius: 12px;
            padding: 16px 8px;
            border: 1px solid #e0eeec;
        }

        .result-stat .value {
            font-size: 24px;
            font-weight: 700;
            color: #5ab0a8;
        }

        .result-stat .label {
            font-size: 12px;
            color: #636e72;
            margin-top: 4px;
        }

        .words-review {
            text-align: left;
            margin-bottom: 24px;
            background: #f9fafb;
            border: 1px solid #e8f0ef;
            border-radius: 12px;
            padding: 16px;
        }

        .words-review h4 {
            font-size: 14px;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .word-item:last-child {
            border-bottom: none;
        }

        .word-item .en {
            font-weight: 600;
            color: var(--dark);
        }

        .word-item .cn {
            color: #636e72;
        }

        .word-item .status {
            font-size: 16px;
        }

        .result-btns {
            display: flex;
            gap: 12px;
        }

        .result-btns button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-retry {
            background: linear-gradient(135deg, #5ab0a8, #7ec8c1);
            color: white;
        }

        .btn-home {
            background: #eef3f2;
            color: var(--dark);
        }

        /* Floating feedback */
        .float-feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 700;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 0.8s ease forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.5); }
        }

        .float-score {
            position: absolute;
            font-size: 16px;
            font-weight: 700;
            color: var(--success);
            pointer-events: none;
            animation: scoreFloat 0.8s ease forwards;
        }

        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* Timer bar */
        .timer-bar {
            height: 4px;
            background: #e8f0ef;
            border-radius: 2px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7bc7a0, #f2cc8f, #e8837c);
            border-radius: 2px;
            transition: width 1s linear;
        }

        /* Game board scrollbar */
        .game-board::-webkit-scrollbar {
            width: 4px;
        }
        .game-board::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 4px;
        }
        .game-board::-webkit-scrollbar-thumb {
            background: #c8d8d6;
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 0;
                align-items: flex-start;
            }
            .game-container {
                border-radius: 0;
                min-height: 100vh;
            }
            .tile {
                font-size: 11px !important;
                min-height: 38px;
                max-height: 50px;
            }
            .game-board {
                max-height: 320px;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="game-header">
            <h1>🎮 单词消消乐</h1>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="headerLevel">Lv.1</div>
                    <div>关卡</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="headerScore">0</div>
                    <div>总分</div>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div class="screen start-screen active" id="startScreen">
            <div class="logo">📚✨</div>
            <h2>单词消消乐</h2>
            <p>配对英文单词和中文释义<br>在游戏中轻松记住单词！</p>
            
            <div class="level-selector">
                <div class="level-btn selected" data-level="cet4" onclick="selectLevel(this)">
                    <div class="level-icon">📗</div>
                    <div class="level-name">四级词汇</div>
                    <div class="level-desc">基础必备</div>
                </div>
                <div class="level-btn" data-level="cet6" onclick="selectLevel(this)">
                    <div class="level-icon">📘</div>
                    <div class="level-name">六级词汇</div>
                    <div class="level-desc">进阶提升</div>
                </div>
                <div class="level-btn" data-level="toefl" onclick="selectLevel(this)">
                    <div class="level-icon">📙</div>
                    <div class="level-name">托福词汇</div>
                    <div class="level-desc">留学必备</div>
                </div>
                <div class="level-btn" data-level="gre" onclick="selectLevel(this)">
                    <div class="level-icon">📕</div>
                    <div class="level-name">GRE词汇</div>
                    <div class="level-desc">挑战高难</div>
                </div>
            </div>

            <!-- Word Count Selector -->
            <div class="word-count-section">
                <div class="section-label">每轮学习词数</div>
                <div class="word-count-selector">
                    <button class="count-btn" onclick="changeWordCount(-1)">−</button>
                    <div class="count-display">
                        <span class="count-number" id="wordCountNum">10</span>
                        <span class="count-unit">词/轮</span>
                    </div>
                    <button class="count-btn" onclick="changeWordCount(1)">+</button>
                </div>
                <div class="time-estimate" id="timeEstimate">
                    📊 词库共 <span id="totalWordsCount">100</span> 词，剩余词数约需 <strong id="daysEstimate">4</strong> 天学完
                    <div id="progressStats"></div>
                </div>
            </div>

            <button class="btn-primary" onclick="startLearning()">开始挑战 🚀</button>
        </div>

        <!-- Learning Screen -->
        <div class="screen learning-screen" id="learningScreen">
            <h3 style="margin-bottom:8px;color:var(--dark);">📖 先学后玩 - 智能记忆</h3>
            <p style="font-size:13px;color:#636e72;margin-bottom:12px;">点击卡片翻转，根据记忆程度选择反馈</p>
            
            <div class="learning-progress" id="learningProgress"></div>
            <div id="familiarityIndicator" style="margin-bottom:12px;"></div>
            
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="word" id="cardWord"></div>
                <div class="phonetic" id="cardPhonetic"></div>
                <div class="meaning" id="cardMeaning"></div>
                <div class="flip-hint">👆 点击翻转</div>
            </div>

            <div class="learning-btns">
                <button class="btn-dont-know" onclick="markWord('unknown')">不认识</button>
                <button class="btn-fuzzy" onclick="markWord('fuzzy')">模糊</button>
                <button class="btn-know" onclick="markWord('known')">认识</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div class="screen game-screen" id="gameScreen">
            <div class="timer-bar">
                <div class="timer-bar-fill" id="timerBarFill" style="width:100%"></div>
            </div>
            <div class="game-info">
                <div class="timer" id="timer">⏱️ <span id="timeLeft">60</span>s</div>
                <div class="combo-display" id="comboDisplay">🔥 x2 连击!</div>
                <div class="score-display">⭐ <span id="gameScore">0</span></div>
            </div>
            <div class="game-board" id="gameBoard"></div>
            <div class="powerups">
                <button class="powerup-btn" onclick="useHint()" title="提示">
                    💡
                    <span class="count" id="hintCount">3</span>
                </button>
                <button class="powerup-btn" onclick="useTimeBonus()" title="+10s">
                    ⏰
                    <span class="count" id="timeCount">2</span>
                </button>
                <button class="powerup-btn" onclick="useShuffle()" title="重排">
                    🔀
                    <span class="count" id="shuffleCount">1</span>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div class="screen result-screen" id="resultScreen">
            <div class="result-icon" id="resultIcon">🎉</div>
            <h2 id="resultTitle">太棒了!</h2>
            <p class="subtitle" id="resultSubtitle">你的单词记忆力超强！</p>
            
            <div class="result-stats">
                <div class="result-stat">

        // Game State
        let state = {
            level: 'cet4',
            currentLevel: 1,
            totalScore: 0,
            gameScore: 0,
            combo: 0,
            maxCombo: 0,
            timeLeft: 60,
            totalTime: 60,
            correct: 0,
            wrong: 0,
            selectedTile: null,
            timerInterval: null,
            currentWords: [],
            learningIndex: 0,
            unknownWords: [],
            hintCount: 3,
            timeCount: 2,
            shuffleCount: 1,
            wordEncounters: {},
            gameActive: false,
            wordsPerRound: 10,
            dailyRounds: 3
        };

        // ===== Spaced Repetition System (similar to Momo) =====
        const MemorySystem = {
            // 间隔时间: 熟悉度对应的复习间隔(秒)
            intervals: [30, 60, 120, 300, 600, 1800, 3600, 86400, 172800, 604800],
            // 熟悉度等级: 0-新词, 1-陌生, 2-模糊, 3-熟悉, 4-掌握, 5-熟练
            
            // 获取单词记忆数据
            getWordMemory(wordKey) {
                const stored = localStorage.getItem(`wordmem_${wordKey}`);
                if (stored) {
                    return JSON.parse(stored);
                }
                return {
                    familiarity: 0,  // 熟悉度 0-5
                    nextReview: Date.now(), // 下次复习时间
                    reviewCount: 0,  // 复习次数
                    correctCount: 0, // 正确次数
                    lastReview: null // 上次复习时间
                };
            },

            // 更新单词记忆数据
            updateWordMemory(wordKey, rating) {
                const mem = this.getWordMemory(wordKey);
                mem.reviewCount++;
                mem.lastReview = Date.now();
                
                if (rating === 'known') {
                    // 认识: 熟悉度+1, 延长间隔
                    mem.familiarity = Math.min(5, mem.familiarity + 1);
                    mem.correctCount++;
                } else if (rating === 'fuzzy') {
                    // 模糊: 熟悉度不变, 短间隔
                    mem.familiarity = Math.max(1, mem.familiarity);
                    mem.correctCount++;
                } else {
                    // 不认识: 熟悉度-1, 立即复习
                    mem.familiarity = Math.max(0, mem.familiarity - 1);
                }
                
                // 根据熟悉度计算下次复习时间
                const interval = this.intervals[mem.familiarity] * 1000;
                mem.nextReview = Date.now() + interval;
                
                localStorage.setItem(`wordmem_${wordKey}`, JSON.stringify(mem));
                return mem;
            },

            // 智能选词: 根据熟悉度和难度选择要学习的词
            selectWords(level, count) {
                const words = wordDB[level];
                const now = Date.now();
                
                // 按优先级排序: 1.到期需复习的词 > 2.新词 > 3.未掌握的词
                const scored = words.map(w => {
                    const key = `${level}_${w.en}`;
                    const mem = this.getWordMemory(key);
                    let priority = 0;
                    
                    if (mem.familiarity === 0) {
                        priority = 1000; // 新词优先
                    } else if (mem.nextReview <= now) {
                        priority = 500 + (5 - mem.familiarity) * 100; // 到期词
                    } else {
                        priority = (5 - mem.familiarity) * 50; // 未掌握的词
                    }
                    
                    // 难词额外权重
                    priority += (w.difficulty || 2) * 20;
                    
                    return { word: w, priority, mem };
                });
                
                scored.sort((a, b) => b.priority - a.priority);
                return scored.slice(0, count).map(s => ({
                    ...s.word,
                    memoryData: s.mem,
                    memoryKey: `${level}_${s.word.en}`
                }));
            },

            // 获取学习统计
            getStats(level) {
                const words = wordDB[level];
                const stats = { total: words.length, new: 0, learning: 0, mastered: 0, dueForReview: 0 };
                const now = Date.now();
                
                words.forEach(w => {
                    const mem = this.getWordMemory(`${level}_${w.en}`);
                    if (mem.familiarity === 0) stats.new++;
                    else if (mem.familiarity >= 4) stats.mastered++;
                    else stats.learning++;
                    
                    if (mem.nextReview <= now && mem.familiarity > 0) {
                        stats.dueForReview++;
                    }
                });
                
                return stats;
            }
        };

        // ===== Sound Effects System (Web Audio API) =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        const SFX = {
            // 点击选中方块
            select() {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.1);
            },

            // 配对正确
            correct() {
                const ctx = getAudioCtx();
                const notes = [523, 659, 784]; // C5, E5, G5
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.2);
                    osc.start(ctx.currentTime + i * 0.08);
                    osc.stop(ctx.currentTime + i * 0.08 + 0.2);
                });
            },

            // 配对错误
            wrong() {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.25);
            },

            // 连击
            combo(comboCount) {
                const ctx = getAudioCtx();
                const baseFreq = 440 + comboCount * 80;
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(baseFreq + i * 200, ctx.currentTime + i * 0.06);
                    gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.06);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.15);
                    osc.start(ctx.currentTime + i * 0.06);
                    osc.stop(ctx.currentTime + i * 0.06 + 0.15);
                }
            },

            // 翻卡
            flip() {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.06);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.08);
            },

            // 使用道具
            powerup() {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            },

            // 倒计时警告 (最后10秒)
            tick() {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.05);
            },

            // 游戏结束 - 胜利
            victory() {
                const ctx = getAudioCtx();
                const melody = [523, 587, 659, 784, 880, 1047]; // C5 D5 E5 G5 A5 C6
                melody.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
                    osc.start(ctx.currentTime + i * 0.1);
                    osc.stop(ctx.currentTime + i * 0.1 + 0.25);
                });
            },

            // 游戏结束 - 时间到
            timeup() {
                const ctx = getAudioCtx();
                const notes = [440, 349, 262]; // A4, F4, C4 descending
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
                    gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
                    osc.start(ctx.currentTime + i * 0.15);
                    osc.stop(ctx.currentTime + i * 0.15 + 0.3);

            click() {
                const ctx = getAudioCtx();

                const gain = ctx.createGain();
                osc.connect(gain);

                osc.frequency.setValueAtTime(500, ctx.currentTime);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.05);

        // Utility Functions
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Level Selection
        function selectLevel(el) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            state.level = el.dataset.level;
            updateEstimate();
        }

        // Word Count Control
        function changeWordCount(delta) {
            SFX.click();
            const min = 5;
            const max = Math.min(20, wordDB[state.level].length);
            state.wordsPerRound = Math.max(min, Math.min(max, state.wordsPerRound + delta));
            document.getElementById('wordCountNum').textContent = state.wordsPerRound;
            updateEstimate();
        }

        function updateEstimate() {
            const totalWords = wordDB[state.level].length;
            const wordsPerDay = state.wordsPerRound * state.dailyRounds;
            
            // 获取学习进度统计
            const stats = MemorySystem.getStats(state.level);
            const remainingWords = stats.new + stats.learning;
            const days = Math.ceil(remainingWords / wordsPerDay);
            
            document.getElementById('totalWordsCount').textContent = totalWords;
            document.getElementById('daysEstimate').textContent = remainingWords > 0 ? days : '已完成';
            
            // 显示进度统计
            const progressDiv = document.getElementById('progressStats');
            if (progressDiv) {
                const masteredPct = Math.round((stats.mastered / stats.total) * 100);
                progressDiv.innerHTML = `
                    <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;">
                        <span style="font-size:11px;">新词: <b>${stats.new}</b></span>
                        <span style="font-size:11px;">学习中: <b>${stats.learning}</b></span>
                        <span style="font-size:11px;">已掌握: <b>${stats.mastered}</b> (${masteredPct}%)</span>
                    </div>
                `;
            }
        }

        // Init estimate on page load
        document.addEventListener('DOMContentLoaded', () => {
            updateEstimate();
        });

        // Learning Phase
        function startLearning() {
            // 使用智能选词系统（根据熟悉度和难度）
            state.currentWords = MemorySystem.selectWords(state.level, state.wordsPerRound);
            state.learningIndex = 0;
            state.unknownWords = [];
            state.wordEncounters = {};
            state.currentWords.forEach(w => {
                state.wordEncounters[w.en] = 0;
            });

            renderLearningProgress();
            showLearningCard();
            showScreen('learningScreen');
        }

        function renderLearningProgress() {
            const container = document.getElementById('learningProgress');
            const total = state.currentWords.length;
            if (total > 8) {
                container.innerHTML = `<div style="font-size:14px;color:var(--primary);font-weight:600;">${state.learningIndex} / ${total}</div>`;
            } else {
                container.innerHTML = state.currentWords.map((_, i) => {
                    let cls = 'progress-dot';
                    if (i < state.learningIndex) cls += ' done';
                    if (i === state.learningIndex) cls += ' active';
                    return `<div class="${cls}"></div>`;
                }).join('');
            }
        }

        function showLearningCard() {
            const word = state.currentWords[state.learningIndex];
            document.getElementById('cardWord').textContent = word.en;
            document.getElementById('cardPhonetic').textContent = word.phonetic;
            document.getElementById('cardMeaning').textContent = word.cn;
            document.getElementById('flashcard').classList.remove('flipped');
            
            // 显示熟悉度指示
            const mem = word.memoryData || MemorySystem.getWordMemory(word.memoryKey);
            const familiarityLabels = ['新词', '陌生', '模糊', '熟悉', '掌握', '熟练'];
            const familiarityColors = ['#e8837c', '#f4a261', '#f2cc8f', '#7bc7a0', '#5ab0a8', '#3d8a83'];
            const fLevel = mem.familiarity;
            const indicator = document.getElementById('familiarityIndicator');
            if (indicator) {
                indicator.innerHTML = `<span style="font-size:11px;padding:4px 10px;background:${familiarityColors[fLevel]};color:white;border-radius:12px;">${familiarityLabels[fLevel]}</span>`;
            }
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
            SFX.flip();
        }

        function markWord(rating) {
            SFX.click();
            const word = state.currentWords[state.learningIndex];
            const memKey = word.memoryKey || `${state.level}_${word.en}`;
            
            // 更新记忆数据
            MemorySystem.updateWordMemory(memKey, rating);
            
            if (rating === 'unknown') {
                state.unknownWords.push(word);
            }
            state.learningIndex++;
            renderLearningProgress();

            if (state.learningIndex >= state.currentWords.length) {
                startGame();
            } else {
                showLearningCard();
            }
        }

        // Game Phase
        function startGame() {
            state.gameScore = 0;
            state.combo = 0;
            state.maxCombo = 0;
            state.correct = 0;
            state.wrong = 0;
            state.selectedTile = null;
            // 根据词数动态调整时间: 每个词10秒基础时间
            state.totalTime = Math.max(45, state.wordsPerRound * 10);
            state.timeLeft = state.totalTime;
            state.hintCount = Math.max(2, Math.floor(state.wordsPerRound / 2));
            state.timeCount = 2;
            state.shuffleCount = 1;
            state.gameActive = true;

            document.getElementById('gameScore').textContent = '0';
            document.getElementById('hintCount').textContent = state.hintCount;
            document.getElementById('timeCount').textContent = state.timeCount;
            document.getElementById('shuffleCount').textContent = state.shuffleCount;

            renderBoard();
            startTimer();
            showScreen('gameScreen');
        }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            const words = state.currentWords;

            // 根据词数动态调整网格列数和字体大小
            const totalTiles = words.length * 2;
            let cols, fontSize;
            
            if (totalTiles <= 10) {
                cols = 2; fontSize = 14;
            } else if (totalTiles <= 16) {
                cols = 4; fontSize = 13;
            } else if (totalTiles <= 24) {
                cols = 4; fontSize = 12;
            } else {
                cols = 5; fontSize = 11;
            }
            
            board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            board.style.fontSize = fontSize + 'px';

            // Create tiles: English words + Chinese meanings
            let tiles = [];
            words.forEach((w, i) => {
                tiles.push({ id: `en-${i}`, text: w.en, type: 'english', wordIndex: i });
                tiles.push({ id: `cn-${i}`, text: w.cn, type: 'chinese', wordIndex: i });
            });

            tiles = shuffle(tiles);

            board.innerHTML = tiles.map(tile => `
                <div class="tile ${tile.type}" 
                     data-id="${tile.id}" 
                     data-word-index="${tile.wordIndex}"
                     data-type="${tile.type}"
                     onclick="selectTile(this)"
                     style="font-size:${fontSize}px">
                    ${tile.text}
                </div>
            `).join('');
        }

        function selectTile(el) {
            if (!state.gameActive) return;
            if (el.classList.contains('eliminated') || el.classList.contains('correct')) return;

            const type = el.dataset.type;
            const wordIndex = parseInt(el.dataset.wordIndex);

            // If clicking the same tile, deselect
            if (state.selectedTile === el) {
                el.classList.remove('selected');
                state.selectedTile = null;
                return;
            }

            // If no tile selected yet
            if (!state.selectedTile) {
                el.classList.add('selected');
                state.selectedTile = el;
                SFX.select();

                // Smart hint for unknown words on first encounter
                const word = state.currentWords[wordIndex];
                state.wordEncounters[word.en] = (state.wordEncounters[word.en] || 0) + 1;
                if (state.unknownWords.includes(word) && state.wordEncounters[word.en] <= 1) {
                    showSmartHint(wordIndex, type);
                }
                return;
            }

            // If same type, switch selection
            if (state.selectedTile.dataset.type === type) {
                state.selectedTile.classList.remove('selected');
                el.classList.add('selected');
                state.selectedTile = el;
                SFX.select();
                return;
            }

            // Try to match
            const firstIndex = parseInt(state.selectedTile.dataset.wordIndex);
            const secondIndex = wordIndex;

            if (firstIndex === secondIndex) {
                // Correct match!
                handleCorrectMatch(state.selectedTile, el);
            } else {
                // Wrong match
                handleWrongMatch(state.selectedTile, el);
            }
        }

        function handleCorrectMatch(tile1, tile2) {
            state.combo++;
            state.correct++;
            if (state.combo > state.maxCombo) state.maxCombo = state.combo;

            // Calculate score with combo bonus
            let points = 10 + (state.combo - 1) * 5;
            state.gameScore += points;
            document.getElementById('gameScore').textContent = state.gameScore;

            // Visual feedback
            tile1.classList.remove('selected');
            tile1.classList.add('correct');
            tile2.classList.add('correct');

            // Show combo
            if (state.combo >= 2) {
                const comboEl = document.getElementById('comboDisplay');
                comboEl.textContent = `🔥 x${state.combo} 连击!`;
                comboEl.classList.remove('active');
                void comboEl.offsetWidth;
                comboEl.classList.add('active');
                SFX.combo(state.combo);
            } else {
                SFX.correct();
            }

            // Float score
            showFloatScore(tile2, `+${points}`);

            // Eliminate after animation
            setTimeout(() => {
                tile1.classList.add('eliminated');
                tile2.classList.add('eliminated');
                checkGameComplete();
            }, 500);

            state.selectedTile = null;
        }

        function handleWrongMatch(tile1, tile2) {
            state.combo = 0;
            state.wrong++;

            // Hide combo display
            document.getElementById('comboDisplay').classList.remove('active');

            // Visual feedback
            tile1.classList.remove('selected');
            tile1.classList.add('wrong');
            tile2.classList.add('wrong');

            // Show feedback
            showFloatFeedback('❌');
            SFX.wrong();

            setTimeout(() => {
                tile1.classList.remove('wrong');
                tile2.classList.remove('wrong');
            }, 400);

            state.selectedTile = null;
        }

        function showSmartHint(wordIndex, clickedType) {
            // Highlight the matching tile briefly
            const matchType = clickedType === 'english' ? 'chinese' : 'english';
            const matchTile = document.querySelector(`.tile[data-word-index="${wordIndex}"][data-type="${matchType}"]`);
            if (matchTile && !matchTile.classList.contains('eliminated')) {
                matchTile.classList.add('hint');
                setTimeout(() => matchTile.classList.remove('hint'), 1500);
            }
        }

        function showFloatScore(el, text) {
            const float = document.createElement('div');
            float.className = 'float-score';
            float.textContent = text;
            float.style.left = el.offsetLeft + el.offsetWidth / 2 + 'px';
            float.style.top = el.offsetTop + 'px';
            el.parentElement.appendChild(float);
            setTimeout(() => float.remove(), 800);
        }

        function showFloatFeedback(emoji) {
            const float = document.createElement('div');
            float.className = 'float-feedback';
            float.textContent = emoji;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);
        }

        // Timer
        function startTimer() {
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();

                if (state.timeLeft <= 10 && state.timeLeft > 0) {
                    SFX.tick();
                }
                if (state.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timeLeft').textContent = state.timeLeft;
            const pct = (state.timeLeft / state.totalTime) * 100;
            document.getElementById('timerBarFill').style.width = pct + '%';

            const timer = document.getElementById('timer');
            if (state.timeLeft <= 10) {
                timer.classList.add('warning');
            } else {
                timer.classList.remove('warning');
            }
        }

        // Power-ups
        function useHint() {
            if (state.hintCount <= 0 || !state.gameActive) return;
            SFX.powerup();
            state.hintCount--;
            document.getElementById('hintCount').textContent = state.hintCount;

            // Find first non-eliminated pair and highlight
            const tiles = document.querySelectorAll('.tile:not(.eliminated)');
            const enTiles = [...tiles].filter(t => t.dataset.type === 'english');
            if (enTiles.length > 0) {
                const tile = enTiles[0];
                const idx = tile.dataset.wordIndex;
                tile.classList.add('hint');
                const match = document.querySelector(`.tile[data-word-index="${idx}"][data-type="chinese"]:not(.eliminated)`);
                if (match) match.classList.add('hint');
                setTimeout(() => {
                    tile.classList.remove('hint');
                    if (match) match.classList.remove('hint');
                }, 2000);
            }
        }

        function useTimeBonus() {
            if (state.timeCount <= 0 || !state.gameActive) return;
            SFX.powerup();
            state.timeCount--;
            document.getElementById('timeCount').textContent = state.timeCount;
            state.timeLeft += 10;
            updateTimerDisplay();
            showFloatFeedback('⏰+10s');
        }

        function useShuffle() {
            if (state.shuffleCount <= 0 || !state.gameActive) return;
            SFX.powerup();
            state.shuffleCount--;
            document.getElementById('shuffleCount').textContent = state.shuffleCount;

            // Re-render non-eliminated tiles in shuffled order
            const board = document.getElementById('gameBoard');
            const tiles = [...board.querySelectorAll('.tile')];
            const nonEliminated = tiles.filter(t => !t.classList.contains('eliminated'));
            const eliminated = tiles.filter(t => t.classList.contains('eliminated'));

            const shuffled = shuffle(nonEliminated.map(t => t.outerHTML));
            let si = 0;
            board.innerHTML = tiles.map(t => {
                if (t.classList.contains('eliminated')) {
                    return t.outerHTML;
                } else {
                    return shuffled[si++];
                }
            }).join('');

            // Clear selection
            state.selectedTile = null;
        }

        // Game Complete Check
        function checkGameComplete() {
            const remaining = document.querySelectorAll('.tile:not(.eliminated)');
            if (remaining.length === 0) {
                setTimeout(() => endGame(true), 300);
            }
        }

        function endGame(completed = false) {
            state.gameActive = false;
            clearInterval(state.timerInterval);

            // Play end sound
            if (completed) {
                SFX.victory();
            } else {
                SFX.timeup();
            }

            // Bonus for time remaining
            if (completed) {
                state.gameScore += state.timeLeft * 2;
            }
            state.totalScore += state.gameScore;

            // Update header
            document.getElementById('headerScore').textContent = state.totalScore;

            // Show results
            showResults(completed);
        }

        function showResults(completed) {
            const total = state.correct + state.wrong;
            const accuracy = total > 0 ? Math.round((state.correct / total) * 100) : 0;

            if (completed && accuracy >= 80) {
                document.getElementById('resultIcon').textContent = '🎉';
                document.getElementById('resultTitle').textContent = '太棒了!';
                document.getElementById('resultSubtitle').textContent = '你的单词记忆力超强！';
            } else if (completed) {
                document.getElementById('resultIcon').textContent = '👍';
                document.getElementById('resultTitle').textContent = '完成挑战!';
                document.getElementById('resultSubtitle').textContent = '继续努力，你会更好！';
            } else {
                document.getElementById('resultIcon').textContent = '⏰';
                document.getElementById('resultTitle').textContent = '时间到!';
                document.getElementById('resultSubtitle').textContent = '下次加油，你可以更快！';
            }

            document.getElementById('resultScore').textContent = state.gameScore;
            document.getElementById('resultCombo').textContent = state.maxCombo;
            document.getElementById('resultAccuracy').textContent = accuracy + '%';

            // Words review
            const wordsList = document.getElementById('wordsList');
            wordsList.innerHTML = state.currentWords.map(w => {
                const isUnknown = state.unknownWords.includes(w);
                return `<div class="word-item">
                    <span class="en">${w.en}</span>
                    <span class="cn">${w.cn}</span>
                    <span class="status">${isUnknown ? '📝' : '✅'}</span>
                </div>`;
            }).join('');

            showScreen('resultScreen');
        }

        function nextLevel() {
            SFX.click();
            state.currentLevel++;
            document.getElementById('headerLevel').textContent = `Lv.${state.currentLevel}`;
            startLearning();
        }

        function goHome() {
            SFX.click();
            state.currentLevel = 1;
            state.totalScore = 0;
            document.getElementById('headerLevel').textContent = 'Lv.1';
            document.getElementById('headerScore').textContent = '0';
            showScreen('startScreen');
        }
    </script>
</body>
</html>
